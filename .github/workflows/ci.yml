name: CI

on:
  push:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24.14.0"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run CI task
        run: vp run ci
